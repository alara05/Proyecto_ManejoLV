<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscar Viaje</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/app.css">
    <link rel="stylesheet" href="../../css/viajes/buscar.css">
</head>
<body>
    <header class="topbar">
        <a href="../home/dashboard.html">Volver</a>
        <h1>Buscar viaje</h1>
    </header>

    <main class="contenedor">
        <form id="formBuscarViaje" class="form-card">
            <label>Origen</label>
            <input type="text" id="origen" placeholder="Ej: Ambato" required>

            <label>Destino</label>
            <input type="text" id="destino" placeholder="Ej: Quito" required>

            <label>Fecha de viaje</label>
            <input type="date" id="fecha" required>

            <label>Cooperativa</label>
            <input type="text" id="cooperativa" placeholder="Opcional">

            <label>Tipo de asiento</label>
            <select id="tipoAsiento">
                <option value="">Todos</option>
                <option value="NORMAL">Normal</option>
                <option value="VIP">VIP</option>
                <option value="DISCAPACIDAD">Discapacidad</option>
            </select>

            <label>Tipo de viaje</label>
            <select id="tipoViaje">
                <option value="">Todos</option>
                <option value="DIRECTO">Directo</option>
                <option value="CON_PARADAS">Con paradas</option>
            </select>

            <button type="submit">Buscar rutas</button>
        </form>

        <section id="resultadosViaje" class="lista-resultados"></section>
    </main>

    <script src="../../js/config.js"></script>
    <script src="../../js/helpers/storage.js"></script>
    <script src="../../js/helpers/api.js"></script>
    <script src="../../js/auth/auth-guard.js"></script>
    <script src="../../js/viajes/buscar.js"></script>
</body>
</html>
