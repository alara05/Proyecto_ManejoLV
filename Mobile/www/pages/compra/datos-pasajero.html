<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Datos del Pasajero</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/app.css">
    <link rel="stylesheet" href="../../css/compra/datos-pasajero.css">
</head>
<body>
    <header class="topbar">
        <a href="../viajes/asientos.html">Volver</a>
        <h1>Pasajero</h1>
    </header>

    <main class="contenedor">
        <form id="formPasajero" class="form-card">
            <label>Nombres del pasajero</label>
            <input type="text" id="nombrePasajero" required>

            <label>Apellidos del pasajero</label>
            <input type="text" id="apellidoPasajero" required>

            <label>CÃ©dula</label>
            <input type="text" id="cedulaPasajero" required>

            <label>Fecha de nacimiento</label>
            <input type="date" id="fechaNacimiento">

            <label>Tipo de tarifa</label>
            <select id="tipoTarifa">
                <option value="NORMAL">Normal</option>
                <option value="MENOR_EDAD">Menor de edad</option>
                <option value="TERCERA_EDAD">Tercera edad</option>
                <option value="DISCAPACIDAD">Discapacidad</option>
            </select>

            <label>Carnet de discapacidad</label>
            <input type="text" id="carnetDiscapacidad" placeholder="Opcional">

            <button type="submit">Continuar al pago</button>
        </form>

        <div id="mensajePasajero" class="mensaje"></div>
    </main>

    <script src="../../js/config.js"></script>
    <script src="../../js/helpers/storage.js"></script>
    <script src="../../js/helpers/api.js"></script>
    <script src="../../js/auth/auth-guard.js"></script>
    <script src="../../js/compra/datos-pasajero.js"></script>
</body>
</html>
