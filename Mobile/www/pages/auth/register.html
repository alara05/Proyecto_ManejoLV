<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear cuenta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/app.css">
    <link rel="stylesheet" href="../../css/auth/login.css">
</head>
<body>
    <main class="pantalla-auth">
        <section class="tarjeta-auth">
            <h1>Crear cuenta</h1>
            <p>Regístrate para comprar boletos</p>

            <form id="formRegister">
                <label for="nombre">Nombres</label>
                <input type="text" id="nombre" required>

                <label for="apellido">Apellidos</label>
                <input type="text" id="apellido">

                <label for="cedula">Cédula</label>
                <input type="text" id="cedula" required>

                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono">

                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" required>

                <button type="submit">Registrarme</button>
            </form>

            <a class="link-auth" href="./login.html">Ya tengo cuenta</a>

            <div id="mensajeRegister" class="mensaje"></div>
        </section>
    </main>

    <script src="../../js/config.js"></script>
    <script src="../../js/helpers/storage.js"></script>
    <script src="../../js/helpers/api.js"></script>
    <script src="../../js/auth/register.js"></script>
</body>
</html>
