<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Mobile - Pasajes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/app.css">
    <link rel="stylesheet" href="../../css/auth/login.css">
</head>
<body>
    <main class="pantalla-auth">
        <section class="tarjeta-auth">
            <img src="../../assets/img/logo.svg" class="logo-app" alt="Logo">

            <h1>Pasajes Ecuador</h1>
            <p>Compra tus boletos de forma rápida y segura</p>

            <form id="formLoginMobile">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="********" required>

                <button type="submit">Ingresar</button>
            </form>

            <button id="btnConfigServidor" class="btn-secundario" type="button">
                Configurar servidor
            </button>

            <section id="panelServidor" class="panel-servidor">
                <label for="apiUrl">URL del servidor Laravel</label>
                <input type="text" id="apiUrl" placeholder="http://192.168.1.10:8000">
                <button id="btnGuardarServidor" type="button">Guardar servidor</button>
            </section>

            <div id="mensajeLoginMobile" class="mensaje"></div>

            <p class="nota-mobile">
                Esta app es solo para usuarios que compran boletos.
            </p>
        </section>
    </main>

    <script src="../../js/config.js"></script>
    <script src="../../js/helpers/storage.js"></script>
    <script src="../../js/helpers/api.js"></script>
    <script src="../../js/auth/login.js"></script>
</body>
</html>
